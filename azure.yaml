# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: onelocalapp
metadata:
  template: onelocalapp@0.1.0
services:
  api:
    project: ./src/api
    language: python
    host: containerapp
    docker:
      path: Dockerfile
      context: .
  web:
    project: ./src/web
    language: ts
    host: containerapp
    docker:
      path: Dockerfile
      context: .
hooks:
  postprovision:
    posix:
      shell: sh
      run: ./scripts/postprovision.sh
      interactive: false
      continueOnError: false
    windows:
      shell: pwsh
      run: ./scripts/postprovision.ps1
      interactive: false
      continueOnError: false
