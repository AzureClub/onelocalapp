name: ci
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  api:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: src/api } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - run: python -c "import ast,glob; [ast.parse(open(f,encoding='utf8').read(),f) for f in glob.glob('app/**/*.py',recursive=True)]"
      - run: pip install ruff
      - run: ruff check app

  web:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: src/web } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run lint --if-present

  bicep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-azure-cli@v3
      - run: az bicep build --file infra/main.bicep --stdout > /dev/null
